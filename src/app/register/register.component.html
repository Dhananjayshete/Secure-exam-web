<div class="reg-wrapper">
  
    <!-- Back Button -->
    <a routerLink="/" class="back-btn">← Back to Home</a>
  
    <div class="reg-card fade-in-up">
      <h2>Create Account</h2>
      <p class="sub-text">Select your user type</p>
  
      <!-- Animated Role Switcher -->
      <div class="role-tabs">
        <div class="tab" [class.active]="activeRole === 'student'" (click)="setRole('student')">
          <span class="icon">🎓</span> Student
        </div>
        <div class="tab" [class.active]="activeRole === 'teacher'" (click)="setRole('teacher')">
          <span class="icon">👨‍🏫</span> Teacher
        </div>
        <div class="tab" [class.active]="activeRole === 'admin'" (click)="setRole('admin')">
          <span class="icon">🛡️</span> Admin
        </div>
      </div>
  
      <!-- The Form -->
      <form>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your name">
        </div>
        
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="name@example.com">
        </div>
  
        <!-- Dynamic Sections with Animation -->
        <div class="dynamic-field slide-in" *ngIf="activeRole === 'student'">
          <label style="color: #667eea">Student ID Number</label>
          <input type="text" placeholder="STU-0000">
        </div>
  
        <div class="dynamic-field slide-in" *ngIf="activeRole === 'teacher'">
          <label style="color: #764ba2">Employee / Teacher ID</label>
          <input type="text" placeholder="TCH-0000">
        </div>
  
        <div class="dynamic-field slide-in" *ngIf="activeRole === 'admin'">
          <label style="color: #d9534f">Admin Security Code</label>
          <input type="password" placeholder="Enter Secret Code">
        </div>
        <!-- End Dynamic Sections -->
  
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••">
        </div>
  
        <button class="submit-btn">
          Register as {{ activeRole | titlecase }}
        </button>
      </form>
      
      <p class="login-link">Already have an account? <a routerLink="/login">Login</a></p>
    </div>
  </div>
